ignore_conditions:
  # servlet-5.0: jetty12-testing set capture-request-parameters=test-parameter, so the metadata
  # generator relabeled the whole default block (SERVER + controller INTERNAL spans) under this
  # condition in 2.28.0 (#18389). It is a test artifact, not a real gate — strip it back to default.
  - otel.instrumentation.servlet.experimental.capture-request-parameters=test-parameter

# Signal identity: span = (span_kind, frozenset(attribute names)), metric = name.
# from_when is always "default" for every entry.
# upstream_pr references the upstream metadata cleanup that introduced the correct when-condition.
corrections:
  # --- controller / view telemetry; applies_to_versions_before: 2.28.0 ---
  - {
      instrumentation: jaxrs-1.0,
      span_kind: INTERNAL,
      attributes: [code.function, code.namespace],
      to_when: "otel.instrumentation.common.experimental.controller-telemetry.enabled=true",
      applies_to_versions_before: "2.28.0",
      upstream_pr: "#18552",
    }
  - {
      instrumentation: jaxrs-3.0-resteasy-6.0,
      span_kind: INTERNAL,
      attributes: [code.function, code.namespace],
      to_when: "otel.instrumentation.common.experimental.controller-telemetry.enabled=true",
      applies_to_versions_before: "2.28.0",
      upstream_pr: "#18555",
    }
  - {
      instrumentation: jfinal-3.2,
      span_kind: INTERNAL,
      attributes: [code.function, code.namespace],
      to_when: "otel.instrumentation.common.experimental.controller-telemetry.enabled=true",
      applies_to_versions_before: "2.28.0",
      upstream_pr: "#18452",
    }
  - {
      instrumentation: play-mvc-2.4,
      span_kind: INTERNAL,
      attributes: [],
      to_when: "otel.instrumentation.common.experimental.controller-telemetry.enabled=true",
      applies_to_versions_before: "2.28.0",
      upstream_pr: "#18366",
    }
  - {
      instrumentation: play-mvc-2.6,
      span_kind: INTERNAL,
      attributes: [],
      to_when: "otel.instrumentation.common.experimental.controller-telemetry.enabled=true",
      applies_to_versions_before: "2.28.0",
      upstream_pr: "#18624",
    }
  - {
      instrumentation: ratpack-1.4,
      span_kind: INTERNAL,
      attributes: [],
      to_when: "otel.instrumentation.common.experimental.controller-telemetry.enabled=true",
      applies_to_versions_before: "2.28.0",
      upstream_pr: "#18252",
    }
  - {
      instrumentation: ratpack-1.7,
      span_kind: CLIENT,
      attributes:
        [
          error.type,
          http.request.method,
          http.request.method_original,
          http.response.status_code,
          http.route,
          peer.service,
          server.address,
          server.port,
          url.full,
        ],
      to_when: "otel.instrumentation.common.experimental.controller-telemetry.enabled=true",
      applies_to_versions_before: "2.28.0",
      upstream_pr: "#18252",
    }
  - {
      instrumentation: spring-webmvc-3.1,
      span_kind: INTERNAL,
      attributes: [code.function, code.namespace],
      to_when: "otel.instrumentation.common.experimental.controller-telemetry.enabled=true,otel.instrumentation.common.experimental.view-telemetry.enabled=true",
      applies_to_versions_before: "2.28.0",
      upstream_pr: "#18513",
    }
  - {
      instrumentation: spring-webmvc-6.0,
      span_kind: INTERNAL,
      attributes: [code.function, code.namespace],
      to_when: "otel.instrumentation.common.experimental.controller-telemetry.enabled=true,otel.instrumentation.common.experimental.view-telemetry.enabled=true",
      applies_to_versions_before: "2.28.0",
      upstream_pr: "#18398",
    }
  # servlet-5.0 controller span: NO applies_to_versions_before => all versions, because the
  # ignore_conditions step folds its block into `default` in every version first.
  - {
      instrumentation: servlet-5.0,
      span_kind: INTERNAL,
      attributes: [code.function, code.namespace],
      to_when: "otel.instrumentation.common.experimental.controller-telemetry.enabled=true",
      upstream_pr: "#18389",
    }

  # --- messaging receive-telemetry; applies_to_versions_before: 2.28.0 ---
