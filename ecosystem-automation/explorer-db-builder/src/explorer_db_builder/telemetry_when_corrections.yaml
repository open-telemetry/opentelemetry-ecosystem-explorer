        [
          messaging.destination.name,
          messaging.destination.temporary,
          messaging.message.id,
          messaging.operation,
          messaging.system,
        ],
      to_when: "otel.instrumentation.messaging.experimental.receive-telemetry.enabled=true",
      applies_to_versions_before: "2.28.0",
      upstream_pr: "#18457",
    }
