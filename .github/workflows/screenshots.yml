name: PR Screenshots

on:
  pull_request:
    branches: [main]
    types: [labeled, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  screenshots:
    if: contains(github.event.pull_request.labels.*.name, 'add-screenshots')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ecosystem-explorer
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Generate explorer database
        run: |
          cd ..
          uv sync --all-extras --dev
          uv run explorer-db-builder

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build the frontend
        run: bun run build

      - name: Create screenshots directory
        run: mkdir -p screenshots

      - name: Take screenshots
        run: node scripts/take-screenshots.mjs

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add and commit screenshots
        run: |
          git add screenshots/
          git diff --quiet --exit-code --cached || git commit -m "docs: add screenshots for PR #$(jq --raw-output .pull_request.number "$GITHUB_EVENT_PATH")"

      - name: Push changes
        run: git push origin HEAD:${{ github.head_ref }}
