name: PR Screenshots

on:
  pull_request:
    branches: [main]
    types: [labeled, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  screenshots:
    if: contains(github.event.pull_request.labels.*.name, 'add-screenshots')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ecosystem-explorer
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc823d497938332a49074c35903af2f23513361 # v2.0.1
        with:
          bun-version: "1.1.34"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install uv
        uses: astral-sh/setup-uv@1ed1432da45330752f20542383139370830bb62c # v5.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.3.0
        with:
          python-version-file: ".python-version"

      - name: Generate explorer database
        run: |
          cd ..
          uv sync --all-extras --dev
          uv run explorer-db-builder

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build the frontend
        run: bun run build

      - name: Create screenshots directory
        run: mkdir -p screenshots

      - name: Take screenshots
        run: node scripts/take-screenshots.mjs

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add and commit screenshots
        run: |
          git add screenshots/
          git diff --quiet --exit-code --cached || git commit -m "docs: add screenshots for PR #$(jq --raw-output .pull_request.number "$GITHUB_EVENT_PATH")"

      - name: Push changes
        run: git push origin HEAD:${{ github.head_ref }}
