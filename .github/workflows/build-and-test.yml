name: Build and Test

on:
  push:
    branches: [main]
    paths:
      - 'ecosystem-automation/**'
      - 'ecosystem-explorer/**'
      - 'build-and-test.yml'
      - 'scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'ecosystem-automation/**'
      - 'ecosystem-explorer/**'
      - 'build-and-test.yml'
      - 'scripts/**'

permissions:
  contents: read

jobs:
  check-copyright-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install uv
        uses: astral-sh/setup-uv@1ed1432da45330752f20542383139370830bb62c # v5.1.0
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.3.0
        with:
          python-version-file: ".python-version"
      - name: Check copyright headers
        run: uv run python scripts/check_copyright.py

  test-ecosystem-automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@1ed1432da45330752f20542383139370830bb62c # v5.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.3.0
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run collector-watcher tests
        run: |
          cd ecosystem-automation/collector-watcher
          uv run pytest tests/ --cov=collector_watcher --cov-report=term-missing --cov-report=json

      - name: Run java-instrumentation-watcher tests
        run: |
          cd ecosystem-automation/java-instrumentation-watcher
          uv run pytest tests/ --cov=java_instrumentation_watcher --cov-report=term-missing --cov-report=json

      - name: Run configuration-watcher tests
        run: |
          cd ecosystem-automation/configuration-watcher
          uv run pytest tests/ --cov=configuration_watcher --cov-report=term-missing --cov-report=json

      - name: Run explorer-db-builder tests
        run: |
          cd ecosystem-automation/explorer-db-builder
          uv run pytest tests/ --cov=explorer_db_builder --cov-report=term-missing --cov-report=json

  test-ecosystem-explorer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecosystem-explorer
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc823d497938332a49074c35903af2f23513361 # v2.0.1
        with:
          bun-version: "1.1.34"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Run integration tests
        run: bun run test:integration

      - name: Run build
        run: bun run build